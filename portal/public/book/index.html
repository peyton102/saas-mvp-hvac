<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Book an appointment</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; padding: 16px; background:#f7f7f8; }
    .card { max-width: 520px; margin: 0 auto; background:#fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.06); padding: 16px; }
    h1 { font-size: 20px; margin: 0 0 10px; }
    label { display:block; font-size: 12px; color:#333; margin:10px 0 6px; }
    input, textarea, select { width:100%; box-sizing:border-box; padding:10px; border:1px solid #ddd; border-radius:8px; font-size:14px; }
    button { width:100%; margin-top:14px; padding:12px; border:0; border-radius:8px; background:#2563eb; color:#fff; font-weight:600; cursor:pointer; }
    .hint { font-size:12px; color:#667; margin-top:8px; }
    .row { display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
    .ok  { color:#065f46; background:#ecfdf5; padding:8px; border-radius:8px; margin-top:10px; display:none; }
    .err { color:#7f1d1d; background:#fef2f2; padding:8px; border-radius:8px; margin-top:10px; display:none; }
    .tabs { display:flex; gap:8px; margin-bottom:12px; }
    .tab-btn { flex:1; padding:8px 10px; border-radius:999px; border:1px solid #d4d4d8; background:#e4e4e7; font-size:13px; font-weight:500; cursor:pointer; color:#111111; }
    .tab-btn.active { background:#2563eb; border-color:#2563eb; color:#ffffff; }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }
    select:disabled { background:#f3f4f6; color:#9ca3af; cursor:not-allowed; }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="pageTitle">Book an appointment</h1>

    <div class="tabs">
      <button id="tabBooking" class="tab-btn active" type="button">Book appointment</button>
      <button id="tabContact" class="tab-btn" type="button">Contact us</button>
    </div>

    <!-- BOOKING PANEL -->
    <div id="bookingPanel" class="tab-panel active">
      <div class="row">
        <div>
          <label>Service</label>
          <select id="service">
            <option value="repair">Repair</option>
            <option value="service">Service</option>
            <option value="tuneup">Tune-up</option>
          </select>
        </div>
        <div>
          <label>Day</label>
          <input id="day" type="date"/>
        </div>
      </div>
      <label>Available times</label>
      <select id="slot" disabled>
        <option value="">Loading availability…</option>
      </select>

      <label>Name</label>
      <input id="name" placeholder="Full name"/>

      <div class="row">
        <div>
          <label>Phone</label>
          <input id="phone" placeholder="+1XXXXXXXXXX"/>
        </div>
        <div>
          <label>Email</label>
          <input id="email" type="email" placeholder="you@example.com"/>
        </div>
      </div>

      <label>Address</label>
      <input id="address" placeholder="123 Main St"/>

      <label>Notes</label>
      <textarea id="notes" rows="3" placeholder="Gate code, pets, etc."></textarea>

      <button id="bookBtn">Book</button>
    </div>

    <!-- CONTACT PANEL -->
    <div id="contactPanel" class="tab-panel">
      <label>Name</label>
      <input id="contactName" placeholder="Full name"/>

      <label>Phone *</label>
      <input id="contactPhone" placeholder="+1XXXXXXXXXX"/>

      <label>Email</label>
      <input id="contactEmail" type="email" placeholder="you@example.com"/>

      <label>How can we help?</label>
      <textarea id="contactMessage" rows="3" placeholder="Describe the issue or question"></textarea>

      <button id="contactBtn">Send message</button>
    </div>

    <div id="ok"  class="ok"></div>
    <div id="err" class="err"></div>
  </div>

<script>
  const qs           = new URLSearchParams(location.search);
  const tenant       = qs.get("tenant") || "default";
  const reschedToken = qs.get("reschedule");
  const isReschedule = !!reschedToken;
  const API          = qs.get("api") || window.__API_BASE__ || "https://saas-mvp-hvac.onrender.com";

  const HEADERS = { "Content-Type": "application/json", "ngrok-skip-browser-warning": "true" };

  // ---- DOM ----
  const serviceEl      = document.getElementById("service");
  const dayEl          = document.getElementById("day");
  const slotEl         = document.getElementById("slot");
  const nameEl         = document.getElementById("name");
  const phoneEl        = document.getElementById("phone");
  const emailEl        = document.getElementById("email");
  const addressEl      = document.getElementById("address");
  const notesEl        = document.getElementById("notes");
  const okEl           = document.getElementById("ok");
  const errEl          = document.getElementById("err");
  const btn            = document.getElementById("bookBtn");

  const tabBookingBtn  = document.getElementById("tabBooking");
  const tabContactBtn  = document.getElementById("tabContact");
  const bookingPanel   = document.getElementById("bookingPanel");
  const contactPanel   = document.getElementById("contactPanel");

  const contactNameEl    = document.getElementById("contactName");
  const contactPhoneEl   = document.getElementById("contactPhone");
  const contactEmailEl   = document.getElementById("contactEmail");
  const contactMessageEl = document.getElementById("contactMessage");
  const contactBtn       = document.getElementById("contactBtn");

  if (isReschedule) {
    document.getElementById("pageTitle").textContent = "Reschedule appointment";
    tabBookingBtn.textContent = "Reschedule";
    btn.textContent = "Reschedule";
  }

  // ---- State ----
  // bookingConfig: { booking_days, booking_start, booking_end, slot_minutes }
  // availableSlots: array of ISO strings from /public/availability
  let bookingConfig   = null;
  let availableSlots  = [];  // pre-fetched, filtered by day on use

  // day abbreviation → JS getDay() value (0=Sun … 6=Sat)
  const DAY_SLUG_TO_JS = { sun:0, mon:1, tue:2, wed:3, thu:4, fri:5, sat:6 };

  // ---- Tabs ----
  function setActiveTab(which) {
    const booking = which === "booking";
    tabBookingBtn.classList.toggle("active",  booking);
    tabContactBtn.classList.toggle("active",  !booking);
    bookingPanel.classList.toggle("active",   booking);
    contactPanel.classList.toggle("active",   !booking);
    okEl.style.display = errEl.style.display = "none";
  }
  tabBookingBtn.addEventListener("click", () => setActiveTab("booking"));
  tabContactBtn.addEventListener("click", () => setActiveTab("contact"));

  // ---- Load config + availability on page load ----
  async function init() {
    try {
      const [cfgRes, avaRes] = await Promise.all([
        fetch(`${API}/public/booking-config?tenant=${encodeURIComponent(tenant)}`, { headers: HEADERS }),
        fetch(`${API}/public/availability?tenant=${encodeURIComponent(tenant)}&days=14`, { headers: HEADERS }),
      ]);

      bookingConfig = cfgRes.ok
        ? await cfgRes.json()
        : { booking_days: ["mon","tue","wed","thu","fri"], booking_start: "08:00", booking_end: "17:00", slot_minutes: 60 };

      const avaData = avaRes.ok ? await avaRes.json() : {};
      availableSlots = avaData.slots || [];

      // Set date min to today
      const today = new Date().toISOString().slice(0, 10);
      dayEl.min = today;

      slotEl.disabled = false;
      slotEl.innerHTML = '<option value="">Pick a day first</option>';
    } catch (e) {
      console.error("[BOOKING INIT]", e);
      slotEl.innerHTML = '<option value="">Could not load availability</option>';
    }
  }

  // ---- Find next available day (skips disallowed weekdays) ----
  function getNextAvailableDay(fromDate, allowedJsDays) {
    const d = new Date(fromDate + "T12:00:00");
    for (let i = 0; i < 14; i++) {
      d.setDate(d.getDate() + 1);
      if (allowedJsDays.includes(d.getDay())) {
        return d.toISOString().slice(0, 10);
      }
    }
    return null;
  }

  // ---- Render time slots for selected day ----
  function renderTimesForDay() {
    const dayValue = dayEl.value;  // "YYYY-MM-DD"
    dayWarnEl.style.display = "none";
    dayWarnEl.textContent = "";
    okEl.style.display = errEl.style.display = "none";

    if (!dayValue) {
      slotEl.innerHTML = '<option value="">Pick a day first</option>';
      return;
    }

    if (!bookingConfig) {
      slotEl.innerHTML = '<option value="">Loading…</option>';
      return;
    }

    // Check day of week — use noon to avoid DST edge cases
    const jsDay  = new Date(dayValue + "T12:00:00").getDay();  // 0=Sun,1=Mon…
    const allowed = bookingConfig.booking_days.map(d => DAY_SLUG_TO_JS[d]);

    if (!allowed.includes(jsDay)) {
      // Auto-advance to the next valid day
      const next = getNextAvailableDay(dayValue, allowed);
      if (next) {
        dayEl.value = next;
        renderTimesForDay();
      } else {
        slotEl.innerHTML = '<option value="">No available days in the next 2 weeks</option>';
      }
      return;
    }

    // Filter pre-fetched slots to this date
    const slotsForDay = availableSlots.filter(s => s.slice(0, 10) === dayValue);

    if (slotsForDay.length === 0) {
      slotEl.innerHTML = '<option value="">No times available — try another day</option>';
      return;
    }

    slotEl.innerHTML = slotsForDay.map(iso => {
      const label = new Date(iso).toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
      return `<option value="${iso}">${label}</option>`;
    }).join("");
  }

  dayEl.addEventListener("change", renderTimesForDay);
  serviceEl.addEventListener("change", () => { if (dayEl.value) renderTimesForDay(); });

  // ---- Helpers ----
  function addMinutes(isoStr, minutes) {
    return new Date(new Date(isoStr).getTime() + minutes * 60000).toISOString();
  }

  // ---- BOOKING submit ----
  btn.addEventListener("click", async () => {
    okEl.style.display = errEl.style.display = "none";

    const startIso = slotEl.value;
    const name     = nameEl.value.trim();

    if (!startIso) {
      errEl.textContent = "Please select a time slot.";
      errEl.style.display = "block";
      return;
    }
    if (!isReschedule && !name) {
      errEl.textContent = "Please enter your name.";
      errEl.style.display = "block";
      return;
    }

    const slotMins = bookingConfig?.slot_minutes || 60;
    const endIso   = addMinutes(startIso, slotMins);

    const service = serviceEl.value || "service";
    const phone   = phoneEl.value.trim()   || null;
    const email   = emailEl.value.trim()   || null;
    const address = addressEl.value.trim() || null;
    const notes   = notesEl.value.trim()   || null;

    const fullNotes = [
      service ? `Service: ${service}` : "",
      address ? `Address: ${address}` : "",
      notes   || "",
    ].filter(Boolean).join("\n") || null;

    try {
      const endpoint = isReschedule
        ? `${API}/public/bookings/reschedule?tenant=${encodeURIComponent(tenant)}`
        : `${API}/book?tenant=${encodeURIComponent(tenant)}`;

      const payload = isReschedule
        ? { token: reschedToken, starts_at_iso: startIso }
        : { start: startIso, end: endIso, name, phone, email, notes: fullNotes };

      const r = await fetch(endpoint, { method: "POST", headers: HEADERS, body: JSON.stringify(payload) });
      const respText = await r.text();
      let resp; try { resp = JSON.parse(respText); } catch { resp = respText; }

      if (!r.ok) {
        const msg = resp?.detail || (typeof resp === "string" ? resp : `HTTP ${r.status}`);
        // If conflict (409), refresh availability so the taken slot disappears
        if (r.status === 409) {
          const avaRes = await fetch(`${API}/public/availability?tenant=${encodeURIComponent(tenant)}&days=14`, { headers: HEADERS });
          if (avaRes.ok) { const d = await avaRes.json(); availableSlots = d.slots || []; }
          renderTimesForDay();
        }
        throw new Error(msg);
      }

      okEl.textContent = isReschedule
        ? "Rescheduled! You'll receive a confirmation shortly."
        : "Booked! You'll receive a confirmation text shortly.";
      okEl.style.display = "block";

      if (!isReschedule) {
        // Remove the booked slot from local list so it disappears immediately
        availableSlots = availableSlots.filter(s => s !== startIso);
        nameEl.value = phoneEl.value = emailEl.value = addressEl.value = notesEl.value = "";
        renderTimesForDay();
      }
    } catch (e) {
      errEl.textContent = `Booking failed: ${e.message || e}`;
      errEl.style.display = "block";
    }
  });

  // ---- CONTACT submit ----
  contactBtn.addEventListener("click", async () => {
    okEl.style.display = errEl.style.display = "none";

    const name    = contactNameEl.value.trim();
    const phone   = contactPhoneEl.value.trim();
    const email   = contactEmailEl.value.trim();
    const message = contactMessageEl.value.trim();

    if (!phone) {
      errEl.textContent = "Please enter your phone number.";
      errEl.style.display = "block";
      return;
    }

    try {
      const r = await fetch(`${API}/lead?tenant_key=${encodeURIComponent(tenant)}`, {
        method: "POST",
        headers: HEADERS,
        body: JSON.stringify({ name: name || null, phone, email: email || null, message: message || null }),
      });
      const respText = await r.text();
      let resp; try { resp = JSON.parse(respText); } catch { resp = respText; }

      if (!r.ok) throw new Error(resp?.detail || `HTTP ${r.status}`);

      okEl.textContent = "Thanks, we've got your message. We'll be in touch soon.";
      okEl.style.display = "block";
      contactNameEl.value = contactPhoneEl.value = contactEmailEl.value = contactMessageEl.value = "";
    } catch (e) {
      errEl.textContent = `Message failed: ${e.message || e}`;
      errEl.style.display = "block";
    }
  });

  // ---- Boot ----
  init();
</script>
</body>
</html>
